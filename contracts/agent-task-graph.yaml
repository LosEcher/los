contract: los.agent-task-graph
version: 0.2.0
status: draft
owner: packages/agent
description: >
  Contract for durable planner/executor/verifier task graphs. The current
  runtime scope supports read-only graph inspection, completion decision
  reporting, and a conservative single-graph serial scheduler claim loop; it
  does not promote los into a full parallel workflow engine.
type: object
sourceOfTruth:
  - agent_tasks
  - task_edges
  - task_attempts
  - task_runs
routes:
  - method: GET
    path: /agent-graphs/{graphId}
    response: AgentTaskGraphReadModel
  - method: GET
    path: /agent-graphs/{graphId}/completion
    response: AgentTaskGraphCompletion
  - method: GET
    path: /runs/{runId}/graph
    response: AgentTaskGraphReadModel
    description: Read the task graph for a specific run.
query:
  requireVerifier:
    type: boolean
    description: >
      When true, completion is blocked until at least one verifier task has
      succeeded.
completion:
  statuses:
    - empty
    - in_progress
    - blocked
    - failed
    - succeeded
  blockReason:
    type: string
    enum:
      - dependency_failure
      - verifier_required
    description: >
      Present when status is blocked, so consumers do not need to string-match
      the human-readable reason.
  canComplete:
    type: boolean
  requiredEvidence:
    - task status counts
    - ready task ids
    - waiting task ids
    - blocked task ids
    - verifier task ids
    - task attempts grouped by task id
rules:
  - queued tasks with unmet dependencies cannot be ready
  - initial scheduler integration claims at most one ready task at a time per loop
  - failed or cancelled dependencies block downstream completion
  - terminal task failure requires retry or operator action
  - external tool summaries cannot replace task attempts or verification records
  - claiming an agent task increments lease_version atomically
  - a graph task_run inherits the claimed agent task lease_version
  - heartbeat and terminal writes require the claimed node id, lease_version, and an unexpired lease
  - losing either the agent_tasks or task_runs lease aborts the active execution
leasing:
  fence:
    ownerField: claimed_by_node_id
    versionField: lease_version
    expiryField: lease_expires_at
  taskRunFence:
    ownerField: node_id
    versionField: lease_version
    expiryField: lease_expires_at
  recovery:
    behavior: requeue_agent_task_until_max_attempts_then_fail_and_fail_task_run
    staleOwnerMayCommit: false
verification:
  - pnpm --filter @los/agent test
  - pnpm --filter @los/gateway test
  - ./tools/check-contracts.sh
