contract: los.agent-task-graph
version: 0.3.0
status: draft
owner: packages/agent
description: >
  Contract for durable planner/executor/verifier task graphs. Governed graphs
  support two to four executor workers with non-overlapping editable surfaces,
  an independent verifier, and an explicit operator integration owner.
type: object
sourceOfTruth:
  - agent_tasks
  - task_edges
  - task_attempts
  - task_runs
  - agent_tasks.metadata_json.graphControl
routes:
  - method: POST
    path: /agent-graphs
    auth: operator
    description: Create a governed graph bound to an approved run spec.
  - method: GET
    path: /agent-graphs/{graphId}
    response: AgentTaskGraphReadModel
  - method: GET
    path: /agent-graphs/{graphId}/watch
    response: AgentTaskGraphReadModel
    description: Pollable operator watch surface with graph control evidence.
  - method: POST
    path: /agent-graphs/{graphId}/run
    auth: operator
    description: Resume the persisted graph with bounded strict editable-surface scheduling.
  - method: GET
    path: /agent-graphs/{graphId}/completion
    response: AgentTaskGraphCompletion
  - method: GET
    path: /runs/{runId}/graph
    response: AgentTaskGraphReadModel
    description: Read the task graph for a specific run.
  - method: POST
    path: /agent-graphs/{graphId}/cancel
    auth: operator
    description: Cancel queued, running, and blocked graph tasks and record the operator action.
  - method: POST
    path: /agent-graphs/{graphId}/integrate
    auth: operator
    description: Record explicit integration only after the independent verifier succeeds.
query:
  requireVerifier:
    type: boolean
    description: >
      When true, completion is blocked until at least one verifier task has
      succeeded.
completion:
  statuses:
    - empty
    - in_progress
    - blocked
    - failed
    - succeeded
  blockReason:
    type: string
    enum:
      - dependency_failure
      - verifier_required
    description: >
      Present when status is blocked, so consumers do not need to string-match
      the human-readable reason.
  canComplete:
    type: boolean
  requiredEvidence:
    - task status counts
    - ready task ids
    - waiting task ids
    - blocked task ids
    - verifier task ids
    - task attempts grouped by task id
rules:
  - queued tasks with unmet dependencies cannot be ready
  - governed graphs contain two to four executor workers
  - every executor worker declares editable surfaces and executor surfaces do not overlap
  - bounded scheduler integration may claim up to the graph maxParallelTasks value
  - planner and verifier tasks do not require editable surfaces because they do not own writes
  - failed or cancelled dependencies block downstream completion
  - terminal task failure requires retry or operator action
  - external tool summaries cannot replace task attempts or verification records
  - claiming an agent task increments lease_version atomically
  - a graph task_run inherits the claimed agent task lease_version
  - heartbeat and terminal writes require the claimed node id, lease_version, and an unexpired lease
  - losing either the agent_tasks or task_runs lease aborts the active execution
  - every mutating graph route requires validated operator privilege
  - graph creation requires an approved run spec and an explicit integration owner
  - integration requires verifier-backed completion and the designated integration owner
  - integration records an operator intervention event and does not automatically merge, push, or release workspaces
leasing:
  fence:
    ownerField: claimed_by_node_id
    versionField: lease_version
    expiryField: lease_expires_at
  taskRunFence:
    ownerField: node_id
    versionField: lease_version
    expiryField: lease_expires_at
  recovery:
    behavior: requeue_agent_task_until_max_attempts_then_fail_and_fail_task_run
    staleOwnerMayCommit: false
verification:
  - pnpm --filter @los/agent test
  - pnpm --filter @los/gateway test
  - ./tools/check-contracts.sh
