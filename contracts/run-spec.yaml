contract: los.run-spec
version: 0.3.0
status: implemented
owner: packages/agent
description: >
  Request contract for a los agent run. Gateway, CLI, and executor nodes use
  this shape before execution-specific callbacks are attached.
type: object
schemaDialect: https://json-schema.org/draft/2020-12/schema
required:
  - prompt
properties:
  prompt:
    type: string
    minLength: 1
  provider:
    type: [string, "null"]
  model:
    type: [string, "null"]
  providerFallback:
    type: object
    required:
      - mode
      - targets
    additionalProperties: false
    properties:
      mode:
        type: string
        const: explicit_ordered
      targets:
        type: array
        minItems: 2
        maxItems: 5
        items:
          type: object
          required:
            - provider
          additionalProperties: false
          properties:
            provider:
              type: string
              minLength: 1
            model:
              type: string
              minLength: 1
      onFailure:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          enum:
            - transport
            - rate_limit
            - provider_unavailable
      requireCompatibilityEvidence:
        type: boolean
        default: true
      maxSwitches:
        type: integer
        minimum: 1
        maximum: 4
  workspaceRoot:
    type: string
    description: Absolute workspace path resolved by the receiving runtime.
  toolMode:
    type: string
    enum:
      - read-only
      - project-write
      - all
    default: project-write
  allowedTools:
    type: array
    items:
      type: string
  sandbox:
    type: object
    properties:
      mode:
        type: string
        enum:
          - read-only
          - workspace-write
          - unrestricted
      approvalPolicy:
        type: string
        enum:
          - never
          - on-request
          - on-failure
  sessionId:
    type: string
  parentSessionId:
    type: string
  traceId:
    type: string
  requestId:
    type: string
  tenantId:
    type: string
  projectId:
    type: string
  userId:
    type: string
  dedupeKey:
    type: string
  timeoutMs:
    type: integer
    minimum: 1
  maxLoops:
    type: integer
    minimum: 1
  attempt:
    type: integer
    minimum: 1
    description: Attempt number for a fresh task_run created from retry or recovery.
  executor:
    type: object
    properties:
      enabled:
        type: boolean
      nodeId:
        type: string
      leaseMs:
        type: integer
        minimum: 1000
      heartbeatMs:
        type: integer
        minimum: 1000
      requiredCapabilities:
        type: array
        description: >
          Capability requirements compiled from run intent before executor
          selection. The scheduler fails closed when no candidate satisfies
          every requirement.
        uniqueItems: true
        items:
          type: string
          enum:
            - workspace_read
            - workspace_write
            - shell
            - sandbox
            - network_egress
            - heavy_task_safe
            - deploy_safe
  status:
    type: string
    enum:
      - created
      - running
      - succeeded
      - failed
      - cancelled
      - blocked
    description: >
      Durable run state. `blocked` is used when runtime completion is prevented
      by a required verifier or another operator-action gate.
  runContract:
    type: object
    description: >
      Operator-provided execution contract. Includes mode, required checks,
      stop conditions, phase lifecycle, plan steps, and verification requirements.
      Standard and heavyweight approval requires a non-empty structured plan
      plus at least one required check or verification requirement.
      Phase transitions are enforced: created → discovering → discovery_ready →
      planning → plan_approved → executing → verifying → succeeded|blocked|failed|cancelled.
    properties:
      mode:
        type: string
        enum: [audit, execution, closeout, governance, feed-analysis-ingress, architect-editor]
      executionMode:
        type: string
        enum: [lightweight, standard, heavyweight]
        default: standard
      phase:
        type: string
        enum: [created, discovering, discovery_ready, planning, plan_approved, executing, verifying, succeeded, blocked, failed, cancelled]
      previousPhase:
        type: string
        enum: [created, discovering, discovery_ready, planning, plan_approved, executing, verifying, succeeded, blocked, failed, cancelled]
      phaseChangedAt:
        type: string
        format: date-time
      plan:
        type: array
        minItems: 1
        items:
          type: object
          required: [id, title, description, dependsOnIds, editableSurfaces, completionCriteria]
          additionalProperties: false
          properties:
            id: { type: string, minLength: 1 }
            title: { type: string, minLength: 1 }
            description: { type: string, minLength: 1 }
            dependsOnIds:
              type: array
              items: { type: string }
            editableSurfaces:
              type: array
              items: { type: string }
            completionCriteria: { type: string, minLength: 1 }
      verifications:
        type: array
        items:
          type: object
          properties:
            id: { type: string }
            kind:
              type: string
              enum: [command, assertion, operator_review]
            description: { type: string }
            command: { type: string }
            assertion: { type: string }
            reviewer: { type: string }
      planRevision:
        type: integer
        minimum: 1
      planParentRevision:
        type: integer
        minimum: 1
      planParentRunSpecId:
        type: string
        description: Parent run spec id when lineage crosses distinct runs; same-run revisions use planParentRevision.
      planHistory:
        type: array
        description: Immutable snapshots of superseded plan revisions and verification mappings.
        items:
          type: object
          required: [revision, plan, requiredChecks, verifications, supersededAt]
          properties:
            revision: { type: integer, minimum: 1 }
            plan: { type: array, items: { type: object } }
            requiredChecks: { type: array, items: { type: string } }
            verifications: { type: array, items: { type: object } }
            supersededAt: { type: string, format: date-time }
            actor: { type: string }
            reason: { type: string }
      requiredChecks:
        type: array
        items: { type: string }
      allowedSkippedChecks:
        type: array
        description: Verification requirement ids that may satisfy the success gate with a skipped status.
        items: { type: string }
      stopConditions:
        type: array
        items: { type: string }
      evidenceRequired:
        type: array
        items: { type: string }
      commitBoundary:
        type: string
additionalProperties: true
events:
  writes:
    - task_runs
    - session_events
    - run.plan_produced
  streams:
    - los.run-stream
operatorControl:
  authentication:
    header: x-los-operator-token
    behaviorWhenAuthDisabled: local_operator
  requiredPrincipal: operator
  actorSource: principal.subject
  anonymousStatus: 401
  nonOperatorStatus: 403
  routes:
    - method: POST
      path: /runs/{runSpecId}/recover
    - method: POST
      path: /runs/{runSpecId}/answer
    - method: POST
      path: /runs/{runSpecId}/verify
    - method: POST
      path: /runs/{runSpecId}/approve
    - method: POST
      path: /runs/{runSpecId}/revise-plan
    - method: POST
      path: /runtimes/{kind}/run
    - method: POST
      path: /runtimes/bridge/start
    - method: POST
      path: /governance/jobs/sweep
    - method: POST
      path: /tasks/dead-letter/{deadLetterEventId}/retry
    - method: POST
      path: /tasks/dead-letter/{deadLetterEventId}/ack
  messageRouterCapabilities:
    run_contract: run:control
    steering: session:steer
    todo_create_or_dispatch: todo:write
    governance_sweep: governance:execute
    runtime: runtime:execute
deadLetterQueue:
  sources:
    - dead_letter_events
    - task_runs
    - run_specs
  routes:
    - method: GET
      path: /tasks/dead-letter
    - method: GET
      path: /tasks/dead-letter/summary
    - method: POST
      path: /tasks/dead-letter/{deadLetterEventId}/ack
      requiredPrincipal: operator
      request:
        required:
          - resolution
        properties:
          resolution:
            enum:
              - replaced
              - superseded
              - accepted_loss
              - regression_covered
          replacementTaskRunId:
            type: string
          note:
            type: string
      behavior:
        preservesOriginalEvent: true
        recordsActorFromPrincipal: true
        replacementRequiredWhen: resolution=replaced
    - method: POST
      path: /tasks/dead-letter/{deadLetterEventId}/retry
      requiredPrincipal: operator
  retryPolicy:
    eligibleReason: lease_expired
    createsFreshTaskRun: true
    preservesOriginalTaskRun: true
    idempotencyField: requeued_task_run_id
verification:
  - pnpm check
  - ./tools/check-contracts.sh
