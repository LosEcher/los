contract: los.todo-dispatch
version: 0.1.0
status: draft
owner: packages/gateway
description: >
  Dispatch a ready todo into the scheduler for execution. Only todos with
  kind 'task' or 'batch' and status 'ready' are eligible. All dependsOnIds
  must be 'done' before dispatch.
type: object
routes:
  - method: POST
    path: /todos/{todoId}/dispatch
    request:
      type: object
      properties:
        force:
          type: boolean
          description: Bypass the ready-status check (dependency and kind gates still apply).
        workspaceRoot:
          type: string
          description: Absolute workspace path for the spawned task run.
        toolMode:
          type: string
          enum: [read-only, project-write, all]
          default: read-only
    response:
      type: object
      properties:
        todo:
          description: The updated todo record with status 'in_progress'.
        taskRun:
          description: The created task_run record with status 'queued'.
    errors:
      - status: 400
        code: todo_not_ready
        description: Todo status is not 'ready' (unless force=true).
      - status: 400
        code: todo_not_dispatchable
        description: Todo kind is not 'task' or 'batch'.
      - status: 400
        code: todo_dependencies_not_met
        description: One or more dependsOnIds are not 'done'.
      - status: 404
        code: not_found
        description: No todo exists with the given id.
sourceOfTruth:
  - todos
  - todo_dependencies
  - task_runs
verification:
  - pnpm check
  - ./tools/check-contracts.sh

  # ── SaaS bridge (tenant/project-scoped) ──

  - method: POST
    path: /tenants/{tenantId}/projects/{projectId}/todos/dispatch
    description: Dispatch los planning seeds into a tenant/project scope.
    request:
      type: object
      properties:
        source:
          type: string
          description: Filter seeds by source prefix.
        dryRun:
          type: boolean
          description: Preview without writing.
    response:
      type: object
      properties:
        dispatched:
          type: number
        skipped:
          type: number
        todoIds:
          type: array
        jobId:
          type: string
        dryRun:
          type: boolean
        scope:
          type: object

  - method: GET
    path: /tenants/{tenantId}/projects/{projectId}/todos/reconcile
    description: Dry-run reconciliation report — compare seeds vs DB.
    response:
      type: object
      properties:
        scope:
          type: object
        seedCount:
          type: number
        dbCount:
          type: number
        hasDrift:
          type: boolean
        hasOrphans:
          type: boolean
        seedOnly:
          type: array
        dbOnly:
          type: array
        statusDrift:
          type: array

  - method: POST
    path: /tenants/{tenantId}/projects/{projectId}/todos/reconcile
    description: Execute reconciliation with auto-fix (seed dispatching, status correction, orphan archival).
    request:
      type: object
      properties:
        fixMode:
          type: string
          enum: [seed_only, db_only, status_drift, all]
          default: all
        dryRun:
          type: boolean
    response:
      type: object
      properties:
        seedOnlyFixed:
          type: number
        dbOnlyFixed:
          type: number
        statusDriftFixed:
          type: number
        errors:
          type: array

  - method: GET
    path: /tenants/{tenantId}/projects/{projectId}/todos
    description: List todos scoped to a tenant/project.
    query:
      status:
        type: string
        description: Filter by status (backlog|ready|in_progress|blocked|done|cancelled).
      limit:
        type: number
      includeArchived:
        type: boolean
    response:
      type: object
      properties:
        todos:
          type: array
