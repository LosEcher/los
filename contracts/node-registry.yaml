contract: los.node-registry
version: 0.1.0
status: draft
owner: packages/agent
description: >
  Registry contract for executor, SSH target, ingress, and proxy nodes. Node
  visibility is separate from execution eligibility.
type: object
required:
  - nodeId
  - nodeKind
  - status
  - connectModes
  - capabilities
  - verified
properties:
  nodeId:
    type: string
  nodeKind:
    type: string
    enum:
      - executor
      - ssh_target
      - ingress
      - proxy
  resourceClass:
    type: string
    description: Resource headroom class for scheduling decisions. Separate from node_kind.
    enum:
      - control
      - standard_executor
      - constrained_executor
    default: standard_executor
  status:
    type: string
    enum:
      - online
      - draining
      - offline
  version:
    type: string
  targetVersion:
    type: string
  rolloutState:
    type: string
    enum:
      - idle
      - draining
      - upgrading
      - verifying
      - failed
  connectModes:
    type: array
    items:
      type: string
      enum:
        - agent_http
        - agent_http_ndjson
        - http_health
        - direct_ssh
        - tailscale_ssh
        - tailscale_native_ssh
        - cf_tunnel_http
        - cf_tunnel_ssh
        - socks5
  connectConfig:
    type: object
    additionalProperties: true
  capabilities:
    type: object
    properties:
      run_agent:
        type: boolean
      stream_ndjson:
        type: boolean
      task_lease:
        type: boolean
      workspace_read:
        type: boolean
      workspace_write:
        type: boolean
      shell:
        type: boolean
      sandbox:
        type: string
        description: Isolation backend name. `tool_policy` and `native` do not satisfy a sandbox requirement.
      network_egress:
        type: boolean
        description: Whether executor tasks can make policy-approved outbound network connections.
      proxy_egress:
        type: boolean
      ingress_callback:
        type: boolean
      model_route:
        type: boolean
      deploy_safe:
        type: boolean
        description: Whether the node can safely run pnpm install / build. Default false for constrained_executor.
      heavy_task_safe:
        type: boolean
        description: Whether the node can accept build, long-task, or batch-file-task scheduling. Default false for constrained_executor.
  capacity:
    type: object
    properties:
      memory_total_mb:
        type: integer
      memory_available_mb:
        type: integer
      swap_total_mb:
        type: integer
      swap_used_mb:
        type: integer
      disk_free_gb:
        type: number
      psi_memory_some:
        type: number
      psi_memory_full:
        type: number
      psi_io_some:
        type: number
      psi_io_full:
        type: number
  verified:
    type: object
    description: Probe or heartbeat verification keyed by connect mode.
    additionalProperties:
      type: object
      properties:
        ok:
          type: boolean
        checked_at:
          type: string
          format: date-time
        source:
          type: string
        endpoint:
          type: string
        error:
          type: string
  queueDepth:
    type: integer
    minimum: 0
  activeTaskCount:
    type: integer
    minimum: 0
  meshLinks:
    type: array
    items:
      type: object
      additionalProperties: true
executionCandidate:
  required:
    - nodeKind: executor
    - status: online
    - capabilities.run_agent: true
    - verified.agent_http_or_ndjson.ok: true
  blockers:
    - heartbeat:stale
    - connect_mode:missing_agent_http
    - capability:run_agent_missing
    - capability:heavy_task_safe_false
    - resource:memory_pressure
    - resource:disk_full
    - resource:psi_high
verification:
  - pnpm check
  - ./tools/check-contracts.sh
