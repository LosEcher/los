contract: los.provider-compat-evidence
version: 0.1.0
status: draft
owner: packages/agent
description: >
  Bounded operator evidence for provider/model compatibility runs. The storage
  table may keep richer summary JSON, but HTTP surfaces expose only redacted
  compatibility proof fields.
type: object
routes:
  - method: GET
    path: /providers/compat-evidence
    query:
      provider:
        type: string
      model:
        type: string
      limit:
        type: integer
        minimum: 1
        maximum: 1000
    response:
      count: integer
      evidence: provider_compat_evidence.rows
  - method: POST
    path: /providers/promotion-decisions
  - method: POST
    path: /providers/promotion-decisions/enforce
operatorControl:
  authentication:
    header: x-los-operator-token
    behaviorWhenAuthDisabled: local_operator
  requiredPrincipal: operator
  actorSource: principal.subject
  anonymousStatus: 401
  nonOperatorStatus: 403
  routes:
    - /providers/promotion-decisions
    - /providers/promotion-decisions/enforce
fields:
  id: string
  provider: string
  model: string | null
  probeId: string
  targetLabel: string
  decision: advisory | verified_advisory | required | blocked
  passed: boolean
  sessionId: string | null
  taskRunId: string | null
  runSpecId: string | null
  traceId: string | null
  requestId: string | null
  nodeId: string | null
  totalTokens: integer
  summary:
    completed: boolean
    cancelled: boolean
    routeReason: configured_default | explicit_provider | explicit_model | architect_editor_override | explicit_fallback_policy | null
    reasoningObserved: boolean
    toolCalls: string[]
    toolResultCount: integer
    failedToolResultCount: integer
    deniedToolCount: integer
    failures: string[]
  createdAt: date-time
  updatedAt: date-time
redaction:
  - Do not expose provider credentials.
  - Do not expose raw prompts, model output, raw transcripts, or arbitrary summary JSON.
  - Failure strings are bounded before HTTP serialization.
verification:
  - pnpm --filter @los/agent test
  - pnpm --filter @los/gateway test
  - pnpm check
  - ./tools/check-contracts.sh
