$schema: https://json-schema.org/draft/2020-12/schema
$id: https://los.local/contracts/meta-schema.yaml
title: los contract envelope
type: object
required:
  - contract
  - version
  - status
  - owner
  - description
properties:
  contract:
    type: string
    pattern: ^los\.[a-z0-9-]+$
  version:
    type: string
    pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
  status:
    type: string
    enum:
      - draft
      - accepted
      - implemented
      - deprecated
  owner:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  type:
    type: string
    enum:
      - object
      - stream
  schemaDialect:
    const: https://json-schema.org/draft/2020-12/schema
additionalProperties: true
