contract: los.run-stream
version: 0.5.0
status: implemented
owner: packages/agent
description: >
  Event contract for active run streaming and replay. HTTP SSE uses event names;
  executor NDJSON uses typed chunks that carry the same session evidence.
type: stream
schemaDialect: https://json-schema.org/draft/2020-12/schema
transport:
  sse:
    contentType: text/event-stream
  ndjson:
    contentType: application/x-ndjson
eventTypes:
  - session
  - session.resumed
  - session.resume_state
  - session.started
  - session.branched
  - session.branch_created
  - session.blocked
  - operator.steering
  - operator.followup
  - operator.control.consumed
  - coordinator.intake_resolved
  - coordinator.intake_blocked
  - coordinator.context_policy_selected
  - coordinator.resume_plan_selected
  - run.resume_dispatch_suppressed
  - run.planning_started
  - run.plan_draft
  - run.plan_produced
  - run.planning_completed
  - task
  - task.created
  - task.deduplicated
  - task.running
  - task.blocked
  - task.cancelled
  - task.succeeded
  - task.failed
  - task.recovery_followup_queued
  - model.delta
  - model.response
  - provider.fallback.selected
  - provider.fallback.exhausted
  - tool.planned
  - tool.approved
  - tool.denied
  - tool.call
  - tool.call.upsert
  - tool.result
  - turn
  - done
  - error
  - cancelled
  - deduplicated
  - blocked
  - awaiting_approval
sseProtocol:
  - session.live
  - session.ready
  - session.event
  - session.completed
live:
  routes:
    - method: GET
      path: /sessions/{sessionId}/events/stream
    - method: GET
      path: /sessions/{sessionId}/events/live
commonFields:
  sessionId:
    type: string
  taskRunId:
    type: string
  nodeId:
    type: string
  traceId:
    type: string
  requestId:
    type: string
  tenantId:
    type: string
  projectId:
    type: string
  userId:
    type: string
  createdAt:
    type: string
    format: date-time
eventPayloads:
  operator.control.consumed:
    sourceEventId: integer
    controlType: operator.steering | operator.followup
    boundary: before_turn | after_completion
    turn: integer
    cursor: integer
    consumerRunSpecId: string | null
    consumerTaskRunId: string | null
    turnBoundary: next_turn | immediate | null
    drainMode: none | finish_current_tool | finish_current_turn | null
    consumedAt: string
  coordinator.intake_resolved:
    requestedProjectId: string | null
    requestedWorkspaceRoot: string | null
    ownerRepo: string
    workspaceRoot: string
    reason: explicit_project | workspace_binding | configured_default
    blocker: null
    runSpecId: string
  coordinator.intake_blocked:
    requestedProjectId: string | null
    requestedWorkspaceRoot: string | null
    ownerRepo: null
    workspaceRoot: null
    reason: unknown_explicit_project | project_context_conflict | project_workspace_conflict | ambiguous_workspace | unbound_workspace | unknown_default_project | owner_unresolved
    blocker: string
    runSpecId: null
  coordinator.context_policy_selected:
    runSpecId: string
    ownerRepo: string
    workspaceRoot: string
    baseSystemPromptSource: request | config | default
    identityName: string
    identityLevel: none | minimal | standard | full
    identityInjected: boolean
    memoryStatus: applied | not_applied | fallback
    memoryLayers: string[]
    activeRuleCount: integer
    observationCount: integer
    codeGraphEnabled: boolean
    codeGraphSelected: boolean
    codeGraphInjected: boolean
  coordinator.resume_plan_selected:
    currentRunSpecId: string
    selectedRunSpecId: string | null
    candidateRunSpecIds: string[]
    selectionReason: latest_recoverable_run | no_recoverable_run | projection_unavailable
    phase: created | running | succeeded | failed | cancelled | blocked | null
    action: none | wait_for_task | recover_tools | cancel_tools | run_verification | inspect_events | operator_attention
    blockerKinds: string[]
    activeTaskRunIds: string[]
    sessionActiveTaskRunIds: string[]
    failedTaskRunIds: string[]
    failedVerificationRecordIds: string[]
    pendingVerificationRecordIds: string[]
    recoveryRecommendation: none | resume | retry | cancel | operator_attention
    lastEventId: integer | null
  run.resume_dispatch_suppressed:
    entityType: run_spec
    entityId: string
    from: created
    to: blocked
    reason: active_task_present
    commandId: string
    causationId: string
    correlationId: string
  awaiting_approval:
    sessionId: string
    runSpecId: string
    taskRunId: string
    traceId: string
    planRevision: integer
    planStepCount: integer
  session.started:
    requestedProvider: string | null
    requestedModel: string | null
    effectiveProvider: string
    effectiveModel: string
    routeReason: configured_default | explicit_provider | explicit_model | architect_editor_override | explicit_fallback_policy
  provider.fallback.selected:
    policyMode: explicit_ordered
    callIndex: integer
    switchIndex: integer
    failureClass: transport | rate_limit | provider_unavailable
    errorCode: string | null
    errorMessage: string
    fromProvider: string
    fromModel: string
    toProvider: string
    toModel: string
    compatibilityEvidenceId: string | null
  provider.fallback.exhausted:
    policyMode: explicit_ordered
    callIndex: integer
    switchCount: integer
    failureClass: transport | rate_limit | provider_unavailable
    errorCode: string | null
    errorMessage: string
    provider: string
    model: string
chunks:
  executorNdjson:
    - type: session_event
      event: session_events.row
    - type: model_delta
      delta: agent.model_delta
    - type: tool_call_state
      transition: tool_call_states.transition
    - type: kernel_event
      kernelEvent: execution-kernel.KernelEvent
    - type: result
      result: agent.result
    - type: error
      error: string
replay:
  routes:
    - method: GET
      path: /runs/{runSpecId}/events
      query:
        since:
          type: integer
          minimum: 0
          description: Return session_events rows with id greater than this cursor.
        limit:
          type: integer
          minimum: 1
          maximum: 10000
      response:
        runSpecId: string
        sessionId: string
        since: integer
        count: integer
        nextSince: integer
        events: session_events.rows
    - method: GET
      path: /runs/{runSpecId}/inspect
      response:
        graph: runtime_evidence_graph
        state: run_state_projection
      description: Runtime evidence graph with the recovery-grade state projection.
    - method: GET
      path: /runs/{runSpecId}/state
      response:
        runSpecId: string
        sessionId: string
        phase: created | running | succeeded | failed | cancelled | blocked
        action: none | wait_for_task | recover_tools | cancel_tools | run_verification | inspect_events | operator_attention
        blockers: run_state_blockers
      description: Compact operator read model for next action and blockers.
    - method: GET
      path: /runs/{runSpecId}/stream
      query:
        since:
          type: integer
          minimum: 0
          description: Return session_events rows with id greater than this cursor.
        streamSince:
          type: integer
          minimum: 0
          description: Return stream_checkpoints rows with id greater than this cursor.
        limit:
          type: integer
          minimum: 1
          maximum: 10000
      response:
        runSpecId: string
        sessionId: string
        since: integer
        streamSince: integer
        count: integer
        nextSince: integer
        nextStreamSince: integer
        items:
          type: array
          items:
            oneOf:
              - kind: stream
                id: integer
                eventType: string
                turn: integer
                payload: object
                createdAt: string
              - kind: event
                id: integer
                type: string
                turn: integer
                payload: object
                createdAt: string
      description: Interleaved stream checkpoints and session events for cross-gateway stream replay.
  sourceOfTruth:
    - run_specs
    - session_events
    - stream_checkpoints
    - task_runs
    - tool_call_states
    - verification_records
  future:
    - SSE reconnect with model.delta replay
operatorControl:
  consumption:
    owner: packages/agent/src/loop.ts
    sourceOfTruth: session_events
    cursor: source event id, tracked independently for steering and follow-up
    idempotency: one operator.control.consumed event per source event and session
    steeringBoundary: before the next model turn, after any in-flight model or tool call returns
    followupBoundary: after the current model response would otherwise complete the run
    immediateBehavior: applies at the next safe loop boundary; it does not interrupt an in-flight provider or tool call
    recoveryBehavior: persisted consumption evidence prevents another gateway or executor from consuming the same source event
    executorBehavior: gateway-local and remote executors consume through the shared PostgreSQL session_events ledger
  websocketMessages:
    - steering
    - cancel
  authentication:
    header: x-los-operator-token
    behaviorWhenAuthDisabled: local_operator
  requiredPrincipal: operator
  actorSource: principal.subject
  anonymousStatus: 401
  nonOperatorStatus: 403
  httpRoutes:
    - method: POST
      path: /sessions/{sessionId}/operator-events
  httpOperatorEvents:
    path: /sessions/:id/operator-events
    idempotencyHeader: x-idempotency-key
    actorSource: principal.subject
    replayBehavior: return_persisted_response_without_duplicate_event
verification:
  - pnpm check
  - ./tools/check-contracts.sh
