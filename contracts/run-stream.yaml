contract: los.run-stream
version: 0.1.0
status: draft
owner: packages/agent
description: >
  Event contract for active run streaming and replay. HTTP SSE uses event names;
  executor NDJSON uses typed chunks that carry the same session evidence.
type: stream
transport:
  sse:
    contentType: text/event-stream
  ndjson:
    contentType: application/x-ndjson
eventTypes:
  - session
  - session.resumed
  - session.resume_state
  - session.started
  - task
  - task.created
  - task.deduplicated
  - task.running
  - task.cancelled
  - task.succeeded
  - task.failed
  - model.delta
  - model.response
  - tool.planned
  - tool.approved
  - tool.denied
  - tool.call
  - tool.result
  - turn
  - done
  - error
commonFields:
  sessionId:
    type: string
  taskRunId:
    type: string
  nodeId:
    type: string
  traceId:
    type: string
  requestId:
    type: string
  tenantId:
    type: string
  projectId:
    type: string
  userId:
    type: string
  createdAt:
    type: string
    format: date-time
chunks:
  executorNdjson:
    - type: session_event
      event: session_events.row
    - type: model_delta
      delta: agent.model_delta
    - type: tool_call_state
      transition: tool_call_states.transition
    - type: result
      result: agent.result
    - type: error
      error: string
replay:
  routes:
    - method: GET
      path: /runs/{runSpecId}/events
      query:
        since:
          type: integer
          minimum: 0
          description: Return session_events rows with id greater than this cursor.
        limit:
          type: integer
          minimum: 1
          maximum: 10000
      response:
        runSpecId: string
        sessionId: string
        since: integer
        count: integer
        nextSince: integer
        events: session_events.rows
    - method: GET
      path: /runs/{runSpecId}/inspect
      response:
        graph: runtime_evidence_graph
        state: run_state_projection
      description: Runtime evidence graph with the recovery-grade state projection.
    - method: GET
      path: /runs/{runSpecId}/state
      response:
        runSpecId: string
        sessionId: string
        phase: created | running | succeeded | failed | cancelled | blocked
        action: none | wait_for_task | recover_tools | cancel_tools | run_verification | inspect_events | operator_attention
        blockers: run_state_blockers
      description: Compact operator read model for next action and blockers.
    - method: GET
      path: /runs/{runSpecId}/stream
      query:
        since:
          type: integer
          minimum: 0
          description: Return session_events rows with id greater than this cursor.
        streamSince:
          type: integer
          minimum: 0
          description: Return stream_checkpoints rows with id greater than this cursor.
        limit:
          type: integer
          minimum: 1
          maximum: 10000
      response:
        runSpecId: string
        sessionId: string
        since: integer
        streamSince: integer
        count: integer
        nextSince: integer
        nextStreamSince: integer
        items:
          type: array
          items:
            oneOf:
              - kind: stream
                id: integer
                eventType: string
                turn: integer
                payload: object
                createdAt: string
              - kind: event
                id: integer
                type: string
                turn: integer
                payload: object
                createdAt: string
      description: Interleaved stream checkpoints and session events for cross-gateway stream replay.
  sourceOfTruth:
    - run_specs
    - session_events
    - stream_checkpoints
    - task_runs
    - tool_call_states
    - verification_records
  future:
    - Last-Event-ID (implemented for session_events)
    - persisted model.delta chunk replay (implemented via stream_checkpoints)
    - SSE reconnect with model.delta replay
verification:
  - pnpm check
  - ./tools/check-contracts.sh
