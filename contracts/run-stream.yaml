contract: los.run-stream
version: 0.1.0
status: draft
owner: packages/agent
description: >
  Event contract for active run streaming and replay. HTTP SSE uses event names;
  executor NDJSON uses typed chunks that carry the same session evidence.
type: stream
transport:
  sse:
    contentType: text/event-stream
  ndjson:
    contentType: application/x-ndjson
eventTypes:
  - session
  - session.resumed
  - session.resume_state
  - session.started
  - task
  - task.created
  - task.deduplicated
  - task.running
  - task.cancelled
  - task.succeeded
  - task.failed
  - model.delta
  - model.response
  - tool.planned
  - tool.approved
  - tool.denied
  - tool.call
  - tool.result
  - turn
  - done
  - error
commonFields:
  sessionId:
    type: string
  taskRunId:
    type: string
  nodeId:
    type: string
  traceId:
    type: string
  requestId:
    type: string
  tenantId:
    type: string
  projectId:
    type: string
  userId:
    type: string
  createdAt:
    type: string
    format: date-time
chunks:
  executorNdjson:
    - type: session_event
      event: session_events.row
    - type: model_delta
      delta: agent.model_delta
    - type: result
      result: agent.result
    - type: error
      error: string
replay:
  routes:
    - method: GET
      path: /runs/{runSpecId}/events
      query:
        since:
          type: integer
          minimum: 0
          description: Return session_events rows with id greater than this cursor.
        limit:
          type: integer
          minimum: 1
          maximum: 10000
      response:
        runSpecId: string
        sessionId: string
        since: integer
        count: integer
        nextSince: integer
        events: session_events.rows
  sourceOfTruth:
    - run_specs
    - session_events
    - task_runs
  future:
    - Last-Event-ID
    - persisted model.delta chunk replay
verification:
  - pnpm check
  - ./tools/check-contracts.sh
