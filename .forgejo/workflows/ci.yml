name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ forgejo.ref }}
  cancel-in-progress: true

# Primary CI workflow. Pull requests run all three jobs. A main push runs only
# gate-fast because the protected PR head already passed gate-test and
# gate-drift; this avoids repeating the two expensive clean-checkout jobs after
# every merge. The node34 runner has two slots, while the workspace test job
# limits Turbo package concurrency to four on its three-core host. gate-fast
# caps its own Turbo work at one task, so the two jobs stay within the runner's
# observed capacity while the expanded workspace suite remains below the
# runner's execution window.
jobs:
  gate-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_CONCURRENCY: 1
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          auth_url="${FORGEJO_SERVER_URL#http://}"
          git init .
          git remote add origin "http://x-access-token:${FORGEJO_TOKEN}@${auth_url}/${FORGEJO_REPOSITORY}.git"
          git fetch --depth=1 origin "$FORGEJO_SHA"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "$FORGEJO_SERVER_URL/$FORGEJO_REPOSITORY.git"

      - name: Prepare pnpm
        run: |
          set -euo pipefail
          node -e "if (Number(process.versions.node.split('.')[0]) < 22) throw new Error('Forgejo runner requires Node 22+')"
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm config set store-dir ~/.local/share/pnpm/store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Observe pnpm store capacity
        run: ./tools/observe-pnpm-store.sh --json

      - name: Fast gate (no DB, no tests)
        run: pnpm run gate -- --no-tests

  gate-test:
    if: forgejo.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres-test:
        image: postgres:16
        env:
          POSTGRES_USER: los_ci_test
          POSTGRES_PASSWORD: los-ci-test-only
          POSTGRES_DB: los_ci_test
          POSTGRES_HOST_AUTH_METHOD: md5
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    env:
      DATABASE_URL: postgres://los_ci_test:los-ci-test-only@postgres-test:5432/los_ci_test
      TEST_DATABASE_URL: postgres://los_ci_test:los-ci-test-only@postgres-test:5432/los_ci_test
      NODE_ENV: test
      LOS_TEST_CONCURRENCY: 4

    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          auth_url="${FORGEJO_SERVER_URL#http://}"
          git init .
          git remote add origin "http://x-access-token:${FORGEJO_TOKEN}@${auth_url}/${FORGEJO_REPOSITORY}.git"
          git fetch --depth=1 origin "$FORGEJO_SHA"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "$FORGEJO_SERVER_URL/$FORGEJO_REPOSITORY.git"

      - name: Prepare pnpm
        run: |
          set -euo pipefail
          node -e "if (Number(process.versions.node.split('.')[0]) < 22) throw new Error('Forgejo runner requires Node 22+')"
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm config set store-dir ~/.local/share/pnpm/store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Test workspace with Turbo concurrency
        run: pnpm test
        timeout-minutes: 20

  gate-drift:
    if: forgejo.event_name != 'push'
    needs: gate-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres-drift:
        image: postgres:16
        env:
          POSTGRES_USER: los_ci_drift
          POSTGRES_PASSWORD: los-ci-drift-only
          POSTGRES_DB: los_ci_drift
          POSTGRES_HOST_AUTH_METHOD: md5
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    # DATABASE_URL is the server URL check-migration-drift uses to CREATE
    # the ephemeral los_drift_mig / los_drift_ensure databases.
    env:
      DATABASE_URL: postgres://los_ci_drift:los-ci-drift-only@postgres-drift:5432/los_ci_drift

    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          auth_url="${FORGEJO_SERVER_URL#http://}"
          git init .
          git remote add origin "http://x-access-token:${FORGEJO_TOKEN}@${auth_url}/${FORGEJO_REPOSITORY}.git"
          git fetch --depth=1 origin "$FORGEJO_SHA"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "$FORGEJO_SERVER_URL/$FORGEJO_REPOSITORY.git"

      - name: Prepare pnpm
        run: |
          set -euo pipefail
          node -e "if (Number(process.versions.node.split('.')[0]) < 22) throw new Error('Forgejo runner requires Node 22+')"
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm config set store-dir ~/.local/share/pnpm/store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # Migration-drift gate. Unset NODE_ENV/TEST_DATABASE_URL so initDb's test
      # guard does not redirect the gate's explicit drift-DB URLs to los_test
      # (would make the gate compare a DB against itself, always green).
      - name: Migration drift
        run: pnpm check:migration-drift
        env:
          NODE_ENV: ''
          TEST_DATABASE_URL: ''
