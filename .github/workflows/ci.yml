name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# CI is split into three parallel jobs so a hang in the DB-dependent test
# phase can no longer burn the whole gate budget, and a failing/hanging
# package surfaces by name instead of as an anonymous timeout.
#
#   gate-fast  — typecheck/structure/coupling/state-machine/contracts/
#                delete-safety/unwired. No DB. Fast feedback.
#   gate-test  — per-package test matrix (postgres service). Each package
#                gets its own step, timeout, and log group, so a hang
#                names the offending package and never exceeds its budget.
#   gate-drift — migration-drift gate (own DB env, isolated from NODE_ENV
#                redirect).
jobs:
  gate-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache turbo (fast)
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-fast-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-fast-${{ github.ref_name }}-
            turbo-${{ runner.os }}-fast-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Fast gate (no DB, no tests)
        run: pnpm run gate -- --no-tests

  gate-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: los
          POSTGRES_PASSWORD: los
          POSTGRES_DB: los_test
          POSTGRES_HOST_AUTH_METHOD: md5
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    env:
      DATABASE_URL: postgres://los:los@localhost:5432/los_test
      TEST_DATABASE_URL: postgres://los:los@localhost:5432/los_test
      NODE_ENV: test

    strategy:
      fail-fast: false
      matrix:
        package:
          # Ordered lightest → heaviest so the slowest package starts early.
          # Per-step timeout bounds a hang to its own package; fail-fast:false
          # keeps every package running so a hang still names itself.
          - infra
          - input-preprocessor
          - web
          - memory
          - gateway
          - executor
          - agent

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache turbo (test)
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-test-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-test-${{ github.ref_name }}-
            turbo-${{ runner.os }}-test-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Test @los/${{ matrix.package }}
        run: pnpm --filter @los/${{ matrix.package }} test
        timeout-minutes: 8

  gate-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: los
          POSTGRES_PASSWORD: los
          POSTGRES_DB: los_test
          POSTGRES_HOST_AUTH_METHOD: md5
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      # Migration-drift gate: bootstrap a fresh DB via migrations only and via
      # ensure*Store only, then diff. Fails on NEW drift vs the committed
      # baseline (tools/migration-drift-baseline.txt). Existing drift is
      # grandfathered until cleaned up. Runs only in CI (needs CREATEDB, which
      # the postgres:16 service user `los` has).
      # Unset NODE_ENV/TEST_DATABASE_URL: initDb's test guard would otherwise
      # ignore the gate's explicit drift-DB URLs and redirect to los_test,
      # making the gate compare a DB against itself (always green, inert).
      - run: pnpm check:migration-drift
        env:
          NODE_ENV: ''
          TEST_DATABASE_URL: ''
