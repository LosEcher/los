name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: los
          POSTGRES_PASSWORD: los
          POSTGRES_DB: los_test
          POSTGRES_HOST_AUTH_METHOD: md5
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    env:
      DATABASE_URL: postgres://los:los@localhost:5432/los_test
      TEST_DATABASE_URL: postgres://los:los@localhost:5432/los_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm run gate

      # Migration-drift gate: bootstrap a fresh DB via migrations only and via
      # ensure*Store only, then diff. Fails on NEW drift vs the committed
      # baseline (tools/migration-drift-baseline.txt). Existing drift is
      # grandfathered until cleaned up. Runs only in CI (needs CREATEDB, which
      # the postgres:16 service user `los` has).
      # Unset NODE_ENV/TEST_DATABASE_URL: initDb's test guard would otherwise
      # ignore the gate's explicit drift-DB URLs and redirect to los_test,
      # making the gate compare a DB against itself (always green, inert).
      - run: pnpm check:migration-drift
        env:
          NODE_ENV: ''
          TEST_DATABASE_URL: ''
