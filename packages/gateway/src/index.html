<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>los — Agent Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
    h1 { font-size: 18px; color: #58a6ff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    h1 .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; }
    #output { flex: 1; overflow-y: auto; margin-bottom: 16px; padding: 12px; background: #161b22; border-radius: 8px; border: 1px solid #30363d; min-height: 300px; max-height: calc(100vh - 200px); font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    #output .system { color: #8b949e; font-style: italic; }
    #output .turn { color: #d2a8ff; margin: 4px 0; }
    #output .tool { color: #7ee787; }
    #output .error { color: #f85149; }
    #output .text { color: #c9d1d9; }
    #controls { display: grid; grid-template-columns: minmax(0, 1fr) 130px 90px; gap: 8px; margin-bottom: 8px; }
    #workspace-root, #tool-mode, #max-loops { padding: 8px 10px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 13px; font-family: inherit; min-width: 0; }
    #workspace-root:focus, #tool-mode:focus, #max-loops:focus { outline: none; border-color: #58a6ff; }
    #input-area { display: flex; gap: 8px; }
    #prompt { flex: 1; padding: 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; font-size: 14px; font-family: inherit; resize: none; }
    #prompt:focus { outline: none; border-color: #58a6ff; }
    button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    button:hover { background: #2ea043; }
    button:disabled { background: #30363d; cursor: not-allowed; }
    .memory-panel { margin-bottom: 12px; font-size: 12px; }
    .memory-panel a { color: #58a6ff; text-decoration: none; margin-right: 16px; }
  </style>
</head>
<body>
  <h1><span class="dot"></span> los agent</h1>
  <div class="memory-panel">
    <a href="/memory">memory</a>
    <a href="/memory/stats">stats</a>
    <a href="/sessions">sessions</a>
    <a href="/health">health</a>
  </div>
  <div id="output">
    <span class="system">Ready. Type a prompt below to start.</span>
  </div>
  <div id="controls">
    <input id="workspace-root" type="text" placeholder="workspace root (default: los repo)">
    <select id="tool-mode">
      <option value="read-only">read-only</option>
      <option value="project-write" selected>project-write</option>
      <option value="all">all tools</option>
    </select>
    <input id="max-loops" type="number" min="1" max="50" value="20" title="Max loops">
  </div>
  <div id="input-area">
    <textarea id="prompt" rows="2" placeholder="Ask the agent to do something..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send-btn" onclick="send()">Send</button>
  </div>

  <script>
    const output = document.getElementById('output');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send-btn');
    const workspaceRootEl = document.getElementById('workspace-root');
    const toolModeEl = document.getElementById('tool-mode');
    const maxLoopsEl = document.getElementById('max-loops');

    function append(cls, text) {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    async function send() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      promptEl.value = '';
      sendBtn.disabled = true;
      output.innerHTML = '';
      append('text', '> ' + prompt);
      append('system', `Thinking... (${toolModeEl.value})`);

      const workspaceRoot = workspaceRootEl.value.trim();
      const maxLoops = Number(maxLoopsEl.value);
      const payload = {
        prompt,
        toolMode: toolModeEl.value,
        maxLoops: Number.isFinite(maxLoops) && maxLoops > 0 ? maxLoops : undefined,
      } as Record<string, unknown>;
      if (workspaceRoot) payload.workspaceRoot = workspaceRoot;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let textAccum = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              const event = line.slice(7);
              continue;
            }
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.sessionId) {
                  append('system', `Session: ${data.sessionId}`);
                } else if (data.tool) {
                  append('tool', `  🔧 ${data.tool}`);
                } else if (data.loopCount) {
                  append('turn', `--- Turn ${data.loopCount} (${data.toolNames?.join(', ') || 'thinking'}) ---`);
                } else if (data.text) {
                  append('text', data.text);
                } else if (data.message) {
                  append('error', 'Error: ' + data.message);
                }
              } catch {}
            }
          }
        }
      } catch (err) {
        append('error', 'Connection error: ' + err.message);
      }

      sendBtn.disabled = false;
      promptEl.focus();
    }
  </script>
</body>
</html>
